# Supabase project configuration for vnsir-prod
# See: https://supabase.com/docs/guides/cli/config

[project]
id = "vnsir-prod"

[api]
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. public and storage are always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request. public is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 15

[studio]
# Port to use for Supabase Studio.
port = 54323

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the Studio interface.
[inbucket]
# Port to use for the email testing server web interface.
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MB"

[auth]
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous sign-ins to your project.
enable_anonymous_sign_ins = false
# Allow/disallow testing manual linking of accounts
enable_manual_linking = false

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = true
# If enabled, users can sign in with a one-time password sent to their email address.
# Magic link / OTP via email — requires SMTP to be configured (Resend).
enable_otp = true
# Controls the minimum amount of time that must pass before sending another signup confirmation or
# password reset email.
otp_expiry = 3600

[auth.email.smtp]
# Use Resend as the SMTP provider for transactional emails (magic links, OTP, confirmations).
# Credentials are injected via environment variables — never hard-coded here.
# See .env.example for required variables.
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
# SMTP password is the Resend API key — set via SUPABASE_AUTH_SMTP_PASS env var.
pass = "env(SUPABASE_AUTH_SMTP_PASS)"
admin_email = "noreply@env(VNSIR_FROM_DOMAIN)"
sender_name = "vnsir"

[auth.sms]
# Configure SMS provider (disabled for this project).
enable_signup = false
enable_confirmations = false

# Configure one of the supported OAuth providers. Each OAuth provider requires
# different configuration and will generate a callback URL on the pattern
# https://your-project-ref.supabase.co/auth/v1/callback?provider={provider_name}
#
# [auth.external.github]
# enabled = false
# client_id = "env(GITHUB_CLIENT_ID)"
# secret = "env(GITHUB_SECRET)"
# redirect_uri = ""

[analytics]
enabled = false
port = 54327
vector_port = 54328
# Setup BigQuery project to enable log viewer on local development stack.
# See: https://supabase.com/docs/guides/getting-started/tutorials/with-nextjs
gcp_project_id = ""
gcp_project_number = ""
gcp_jwt_path = "supabase/gcloud.json"
